<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#0f766e" />
    <title>Repair LensLog</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f5f3ee;
        color: #17201c;
      }

      main {
        display: grid;
        gap: 14px;
        width: min(520px, calc(100% - 32px));
        padding: 24px;
        border: 1px solid #d9d3c8;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgba(31, 39, 34, 0.12);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.7rem, 5vw, 3rem);
        line-height: 1;
      }

      p {
        color: #65706b;
        line-height: 1.5;
        font-weight: 750;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        border-radius: 8px;
        background: #0f766e;
        color: #ffffff;
        font-weight: 850;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Repairing LensLog</h1>
      <p id="status">Clearing old image cache...</p>
      <a id="continueLink" href="./?fresh=1">Open LensLog</a>
    </main>

    <script>
      async function repairLensLog() {
        const status = document.querySelector("#status");
        const continueLink = document.querySelector("#continueLink");
        try {
          const saved = JSON.parse(localStorage.getItem("lenslog-state-v1") || "null");
          if (saved) {
            localStorage.setItem(
              "lenslog-state-v1",
              JSON.stringify({
                userId: saved.userId,
                profile: saved.profile || {},
                myPostIds: saved.myPostIds || [],
                liked: saved.liked || [],
                reported: saved.reported || [],
                theme: saved.theme || "light"
              })
            );
          }
        } catch {}

        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
        } catch {}

        try {
          if ("caches" in window) {
            const names = await caches.keys();
            await Promise.all(names.map((name) => caches.delete(name)));
          }
        } catch {}

        status.textContent = "Done. Opening a fresh copy...";
        continueLink.href = `./?fresh=${Date.now()}`;
        window.setTimeout(() => {
          window.location.replace(continueLink.href);
        }, 700);
      }

      repairLensLog();
    </script>
  </body>
</html>
