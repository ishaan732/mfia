name: Keep LensLog Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 \
            https://lenslog.onrender.com/api/health
